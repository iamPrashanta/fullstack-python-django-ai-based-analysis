<!DOCTYPE html>
<html>
<head>
    <title>Company List</title>
</head>
<body>

<h1>Exhibitor Companies</h1>

<table border="1" cellpadding="10">
    <tr>
        <th>Logo</th>
        <th>Name</th>
        <th>Country</th>
        <th>Hall</th>
        <th>Booth</th>
        <th>Sector</th>
    </tr>

    {% for company in exhibitors %}
    <tr>
        <td>
            {% if company.logo_url %}
                <a href="{{ company.logo_url }}" target="_blank">
                    <button>View Logo</button>
                </a>
            {% else %}
                No Logo
            {% endif %}
        </td>
        <td>{{ company.name }}</td>
        <td>{{ company.country }}</td>
        <td>{{ company.hall }}</td>
        <td>{{ company.booth }}</td>
        <td>{{ company.sector }}</td>
    </tr>
    {% endfor %}

</table>

</body>
</html>
